name: transmit

on:
  schedule:
    - cron: '14 3 * * *'   # 03:14 UTC, nightly
  workflow_dispatch:

permissions:
  contents: write

jobs:
  emit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: emit transmission
        run: python transmit.py
      - name: commit
        run: |
          git config user.name "⟁"
          git config user.email "79324095+SaxxSaxx@users.noreply.github.com"
          git add feed.log README.md
          git commit -m "$(date -u +%Y-%m-%dT%H:%MZ)" || exit 0
          git push
